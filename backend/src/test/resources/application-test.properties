# Disable Last.fm and Spotify for tests
app.lastfm.api-key=test
app.lastfm.artist-name=test
app.lastfm.base-url=http://localhost:9999

# JWT
app.jwt.secret=test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
app.jwt.expiration-ms=86400000

# Flyway
spring.flyway.enabled=true

spring.security.user.name=disabled
spring.security.user.password=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration